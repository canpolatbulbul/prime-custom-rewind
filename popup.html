<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="header">
    <h3>Prime Custom Rewind</h3>
  </div>
  <div class="content">
    <div class="field">
      <label for="rewind">Rewind (s):</label>
      <input type="number" id="rewind" min="0.5" step="0.5" value="2">
    </div>
    <div class="field">
      <label for="forward">Forward (s):</label>
      <input type="number" id="forward" min="0.5" step="0.5" value="3">
    </div>
    <div class="section-title">Keybinds</div>
    <div class="field">
      <label for="rewindKey">Rewind Key:</label>
      <input type="text" id="rewindKey" class="key-input" readonly placeholder="Press a key...">
    </div>
    <div class="field">
      <label for="forwardKey">Forward Key:</label>
      <input type="text" id="forwardKey" class="key-input" readonly placeholder="Press a key...">
    </div>
    <button id="save">Save Settings</button>
  </div>
  <div class="footer">
    <div class="hint">Click a keybind box and press any key to map it.</div>
    <div class="source-container">
      <a href="https://github.com/canpolatbulbul/prime-custom-rewind" target="_blank" class="source-link">

  </div>
  <script src="popup.js"></script>
</body>
</html>
